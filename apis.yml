name: CMC Materials
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Semiconductors
  - Materials
  - Manufacturing
  - CMP
  - Specialty Chemicals
description: >-
  CMC Materials is a global supplier of consumable materials primarily to the
  semiconductor industry, including chemical mechanical planarization (CMP)
  slurries and polishing pads. Acquired by Entegris in 2022, CMC's materials
  portfolio is now part of the Entegris specialty chemicals and CMP solutions
  business, serving semiconductor manufacturers through advanced materials
  and process technologies.
created: '2026-05-05'
modified: '2026-05-16'
specificationVersion: '0.19'
apis:
  - aid: cmc-materials:cmp-slurries
    name: CMC Materials CMP Slurries
    tags:
      - Semiconductors
      - CMP
      - Slurries
      - Specialty Chemicals
    humanURL: https://www.entegris.com/
    properties:
      - url: https://www.entegris.com/
        type: Documentation
    description: >-
      Chemical mechanical planarization (CMP) slurries for semiconductor wafer
      polishing. CMC slurries cover tungsten, copper, dielectric, barrier metal,
      and STI applications across leading-edge and legacy nodes, now offered
      through the Entegris specialty chemicals product line.

  - aid: cmc-materials:cmp-polishing-pads
    name: CMC Materials CMP Polishing Pads
    tags:
      - Semiconductors
      - CMP
      - Polishing Pads
    humanURL: https://www.entegris.com/
    properties:
      - url: https://www.entegris.com/
        type: Documentation
    description: >-
      Polyurethane and composite polishing pads engineered for CMP processes
      across semiconductor fab operations. Used in combination with CMC
      slurries to achieve target surface flatness and defectivity at
      production scale.

  - aid: cmc-materials:wood-treatment
    name: CMC Materials Wood Treatment Chemicals
    tags:
      - Specialty Chemicals
      - Wood Treatment
      - Preservatives
    humanURL: https://www.entegris.com/
    properties:
      - url: https://www.entegris.com/
        type: Documentation
    description: >-
      Wood treatment chemicals and preservation solutions sold to industrial
      customers for utility poles, railroad ties, and construction lumber.
      Part of the historical CMC Materials portfolio that was carved out
      during the Entegris acquisition.

  - aid: cmc-materials:pipeline-performance
    name: CMC Materials Pipeline Performance Chemicals
    tags:
      - Specialty Chemicals
      - Pipeline
      - Drag Reduction
    humanURL: https://www.entegris.com/
    properties:
      - url: https://www.entegris.com/
        type: Documentation
    description: >-
      Drag reduction agents and pipeline performance chemicals used by oil
      and gas pipeline operators to improve throughput. Part of the
      historical CMC Materials portfolio, with the operating business
      reorganized after the Entegris acquisition.
